version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: mysql-app2
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: backprojectdb
    ports:
      - "3308:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - spring-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 5

  springdockerpj2:
    image: ${DOCKERHUB_USERNAME}/springdockerpj2:latest
    container_name: springdockerpj2
    restart: always
    ports:
      - "8095:8095"
    networks:
      - spring-network
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/backprojectdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}

networks:
  spring-network:
    name: spring-network
    external: true
volumes:
  mysql-data: