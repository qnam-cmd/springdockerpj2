<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원 가입</title>
</head>
<body>
<h2>회원 가입</h2>
<form id="joinForm">
    <label>이메일: <input type="text" name="userEmail"></label><br>
    <label>비밀번호: <input type="password" name="userPw"></label><br>
    <label>이름: <input type="text" name="userName"></label><br>
    <button type="button" onclick="joinMember()">가입하기</button>
</form>

<script>
    function joinMember() {
        const form = document.getElementById('joinForm');
        // form 안의 데이터를 FormData 객체로 묶습니다.
        const formData = new FormData(form);

        fetch('/api/member/join', {
            method: 'POST',
            // @ModelAttribute가 받을 수 있도록 FormData를 그대로 전송합니다.
            body: formData
        })
            .then(response => {
                if (response.ok) return response.json();
                throw new Error("가입 실패");
            })
            .then(data => {
                // 서버에서 넘겨준 Map의 "result" 키를 확인합니다.
                console.log(data.result);
                alert('회원가입이 완료되었습니다.');
                location.href = '/memberList.html'; // 목록 페이지로 이동
            })
            .catch(error => {
                alert(error.message);
            });
    }
</script>
</body>
</html>
