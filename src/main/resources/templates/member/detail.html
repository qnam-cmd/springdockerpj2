<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원 상세 정보</title>
</head>
<body>
<h2>회원 상세/수정</h2>
<form id="updateForm">
    <input type="hidden" name="id" id="memberId">

    <label>이메일: <input type="text" name="userEmail" id="userEmail" readonly></label><br>
    <label>비밀번호: <input type="password" name="userPw" id="userPw"></label><br>
    <label>이름: <input type="text" name="userName" id="userName"></label><br>

    <button type="button" onclick="updateMember()">수정하기</button>
    <button type="button" onclick="deleteMember()">삭제하기</button>
</form>

<script>
    // URL에서 '?id=숫자' 부분의 파라미터 값을 추출합니다.
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');

    // 1. 상세 정보 불러오기 (페이지 로드 시)
    window.onload = function() {
        fetch('/api/member/detail/' + id)
            .then(response => response.json())
            .then(data => {
                const member = data.result;
                // 받아온 JSON 데이터를 input 태그의 value에 채워 넣습니다.
                document.getElementById('memberId').value = member.id;
                document.getElementById('userEmail').value = member.userEmail;
                document.getElementById('userName').value = member.userName;
            });
    };

    // 2. 수정 요청 (PUT)
    function updateMember() {
        const form = document.getElementById('updateForm');
        const formData = new FormData(form);

        fetch('/api/member/update', {
            method: 'PUT',
            body: formData // @ModelAttribute 처리용
        })
            .then(response => {
                if (response.ok) {
                    alert('수정되었습니다.');
                    location.href = '/memberList.html';
                }
            });
    }

    // 3. 삭제 요청 (DELETE)
    function deleteMember() {
        if(!confirm("정말 삭제하시겠습니까?")) return;

        fetch('/api/member/delete/' + id, {
            method: 'DELETE'
        })
            .then(response => {
                if (response.ok) {
                    alert('삭제되었습니다.');
                    location.href = '/memberList.html';
                }
            });
    }
</script>
</body>
</html>
